<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callia’s Flowers</title>

    <style>
      body {
        margin: 0;
        background: #cfd7e1;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 90px;
      }

      section.bento-grid {
        width: min(2250px, 100%);
        background: #ccbfac;
        padding: 50px;
        border-radius: 30px;

        display: grid;
        grid-template-columns: repeat(9, 200px);
        grid-template-rows: 100px 170px 200px 150px 170px 200px 170px 200px 100px;
        gap: 30px;
      }

      .grid-item {
        border-radius: 30px;
        overflow: hidden;
        background: #fff;
      }

      .grid-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .center-tile {
        background: #f28c8c;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 750;
        font-size: 110px;
      }
    </style>
  </head>

  <body>
    <main>
      <section class="bento-grid" aria-label="Bento grid: Flower theme">
        <!-- Example placements (edit these to manually match your reference) -->
        <div class="grid-item" style="grid-column: 1 / span 3; grid-row: 1 / span 3;">
          <img src="assets/CSS1.jpg" alt="Flower arrangement in a hat box" />
        </div>

        <div class="grid-item" style="grid-column: 4 / span 2; grid-row: 1 / span 3;">
          <img src="assets/CSS2.jpg" alt="Wrapped bouquet with pink and white flowers" />
        </div>

        <div class="grid-item" style="grid-column: 6 / span 2; grid-row: 1 / span 3;">
          <img src="assets/CSS3.jpg" alt="pink and white flowers in a vase" />
        </div>

        <div class="grid-item" style="grid-column: 8 / span 3; grid-row: 1 / span 4;">
          <img src="assets/CSS4.jpg" alt="Pink and white flowers" />
        </div>

        <div class="grid-item" style="grid-column: 1 / span 3; grid-row: 4 / span 3;">
          <img src="assets/CSS5.jpg" alt="Bouquet in metal vase" />
        </div>

        <div class="grid-item center-tile" style="grid-column: 4 / span 4; grid-row: 4 / span 3">
          Callia’s Flowers
        </div>

        <div class="grid-item" style="grid-column: 8 / span 3; grid-row: 5 / span 5;">
          <img src="assets/CSS6.jpg" alt="Bouquet in hand" />
        </div>

        <div class="grid-item" style="grid-column: 1 / span 4; grid-row: 7 / span 3;">
          <img src="assets/CSS7.jpg" alt="Orange bouquet" />
        </div>

        <div class="grid-item" style="grid-column: 5 / span 3; grid-row: 7 / span 3;">
          <img src="assets/CSS8.jpg" alt="Hand holding a bouquet against an orange wall" />
        </div>
      </section>
    </main>
  </body>
</html>
